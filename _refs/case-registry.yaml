      用於展示「可執行規格必須包含約束條件（constraints），不只是功能描述」。

  # ========== Ch 11 ==========
  - id: CASE-ECM-102
    title: "PrimeCart 的架構夾縫：PM 與 SA 各說各話"
    domain: ecommerce
    chapters: [ch-11, ch-22]
    anonymized: true
    summary: |
      虛構電商 PrimeCart：PM 要求「即時庫存顯示」，SA 設計了 eventual consistency
      方案（延遲 3 秒）。上線後客服湧入「庫存顯示錯誤」投訴。
      兩方都沒有錯，但沒有共同語言來定義「即時」。
      用於展示 PM × SA 接口的「術語對齊」需求。Ch 22 為第二次引用，
      延伸至黑色星期五大促庫存顯示事故與事後術語定義表補錄場景。

  # ========== Ch 22 ==========
