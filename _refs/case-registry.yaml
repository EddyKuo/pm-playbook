# PM Playbook Case Registry
#
# 所有章節案例必須先在此註冊才能在內文使用。
# 政策：純虛構公司名/產品名/數字，但商業邏輯與商業決策必須真實可驗證。
# ID 格式：CASE-{DOMAIN}-{NNN}
# DOMAIN 代碼：FIN(fintech) / ECM(ecommerce) / HCR(healthcare) / SAS(saas) / ENR(energy)
# 注意：與 SA/SD playbook 的案例 ID 共享格式，但本書自行管理；兩書案例可互相引用但需標注來源。

cases:
  # ========== Ch 1 ==========
  - id: CASE-SAS-101
    title: "Loopline 的需求會議：50 個需求，沒有一個問題"
    domain: saas
    chapters: [ch-01]
    anonymized: true
    summary: |
      虛構 SaaS 新創 Loopline：PM 在季度規劃時收到來自 Sales、CS、CEO
      三方共 50 條需求清單，每一條都是「最重要的」。
      Sprint 1 啟動後兩週，工程師交付了功能，但沒有一條真正解決使用者的核心問題。
      用於展示「問題探索比解決方案選擇更重要」。

  # ========== Ch 2 ==========
  - id: CASE-FIN-101
    title: "ClearPay 的上線審批：最後一分鐘的否決"
    domain: fintech
    chapters: [ch-02]
    anonymized: true
    summary: |
      虛構 Fintech ClearPay：支付功能開發完成後，Legal 在上線前三天
      發現 KYC 合規問題，整個 sprint 暫停。PM 事前未將 Legal 列為 stakeholder。
      用於展示「Stakeholder mapping 必須在需求收集前完成」。

  # ========== Ch 3 ==========
  - id: CASE-ECM-101
    title: "ShopFlow 的 OKR 悖論：指標達成，使用者流失"
    domain: ecommerce
    chapters: [ch-03]
    anonymized: true
    summary: |
      虛構電商 ShopFlow：Q3 OKR 目標是「結帳轉換率提升 15%」，達成了。
      但同期 NPS 下降 12 點，因為 PM 移除了「稍後購買」功能以強迫轉換。
      用於展示「指標可以被操縱；OKR 需要配套護欄指標」。

  # ========== Ch 5 ==========
  - id: CASE-HCR-101
    title: "CareRoute 醫療系統 JCI 認證週期的 Sprint 優先序錯位事件"
    domain: healthcare
    chapters: [ch-05]
    anonymized: true
    summary: |
      虛構醫院資訊系統廠商 CareRoute（服務 12 家區域醫院、產品為 HIS 整合
      平台）：PM 林佳蓉用 MoSCoW 對齊三個月 roadmap，護理部代表缺席對齊會，
      藥單列印格式需求被標為 Should Have。Sprint 3 完成後 sprint review，
      IT 主任揭露 JCI 認證截止日在 12 月，藥單格式不符合 Medication
      Management 3.2.1 標準，直接影響認證評分。根因為 MoSCoW 沒有量化定義、
      DACI 的 Approver 未明確、合規截止日未轉換為時間約束條件。
      用於展示「排序框架選擇之前，決策結構（DACI + 截止日）才是真正的
      優先順序問題」。

  # ========== Ch 8 ==========
  - id: CASE-SAS-102
    title: "Teamline 的 Spec 事故：工程師做了 PM 以為沒人會做的選擇"
    domain: saas
    chapters: [ch-08]
    anonymized: true
    summary: |
