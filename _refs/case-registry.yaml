  # ========== Ch 10 (second case) ==========
  - id: CASE-SAS-116
    title: "TaskFlow 試用期轉換謎題：功能不夠多，還是 Onboarding 方向錯了？"
    domain: saas
    chapters: [ch-10]
    anonymized: true
    summary: |
      虛構 B2B 專案管理 SaaS TaskFlow：14 天試用轉換率卡在 12%，
      比同類競品低 8 個百分點。初始假設是「功能不夠多」，
      但 JTBD 分析後發現 Onboarding 流程是功能展示而非情境引導，
      用戶無法在第一天把功能對應到自己的工作場景。
      用於展示「JTBD 事前設計：用 Job 分析決定解法方向，避免錯誤的功能投入」。
